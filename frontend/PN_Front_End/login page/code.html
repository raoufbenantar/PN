<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Project Nature - Connexion</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@100..900&amp;family=Space+Grotesk:wght@100..900&amp;family=Work+Sans:wght@100..900&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-surface-variant": "#434842",
                        "inverse-on-surface": "#f1f1ef",
                        "tertiary-fixed-dim": "#dfc296",
                        "background": "#f9f9f7",
                        "outline-variant": "#c3c8c0",
                        "surface-container-high": "#e8e8e6",
                        "error-container": "#ffdad6",
                        "primary-fixed": "#cfe9d1",
                        "primary-fixed-dim": "#b3cdb6",
                        "surface": "#f9f9f7",
                        "on-primary": "#ffffff",
                        "tertiary-fixed": "#fcdeb0",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#352505",
                        "surface-container-highest": "#e2e3e1",
                        "surface-container-low": "#f4f4f2",
                        "on-secondary-fixed": "#360f00",
                        "secondary-fixed-dim": "#ffb597",
                        "on-primary-fixed": "#0a2011",
                        "tertiary-container": "#4d3a19",
                        "secondary-container": "#fe844d",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#ffdbcd",
                        "primary-container": "#2c4231",
                        "secondary": "#a23f0a",
                        "surface-tint": "#4d6451",
                        "on-tertiary-fixed-variant": "#574421",
                        "surface-container": "#eeeeec",
                        "on-tertiary-fixed": "#271900",
                        "surface-dim": "#dadad8",
                        "on-secondary": "#ffffff",
                        "on-background": "#1a1c1b",
                        "surface-variant": "#e2e3e1",
                        "outline": "#737972",
                        "inverse-primary": "#b3cdb6",
                        "on-surface": "#1a1c1b",
                        "on-secondary-container": "#6b2500",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "on-error": "#ffffff",
                        "on-tertiary-container": "#bfa47a",
                        "on-primary-container": "#95ae98",
                        "on-secondary-fixed-variant": "#7e2c00",
                        "surface-bright": "#f9f9f7",
                        "inverse-surface": "#2f3130",
                        "on-primary-fixed-variant": "#364c3a",
                        "primary": "#162c1c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "overlap-sm": "-16px",
                        "overlap-md": "-40px",
                        "margin-desktop": "64px",
                        "base": "8px",
                        "gutter": "24px",
                        "margin-mobile": "20px"
                    },
                    "fontFamily": {
                        "label-caps": ["Space Grotesk"],
                        "display-lg": ["Epilogue"],
                        "headline-md": ["Epilogue"],
                        "body-lg": ["Work Sans"],
                        "headline-lg-mobile": ["Epilogue"],
                        "headline-lg": ["Epilogue"],
                        "body-md": ["Work Sans"]
                    },
                    "fontSize": {
                        "label-caps": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "display-lg": ["80px", { "lineHeight": "90px", "letterSpacing": "-0.02em", "fontWeight": "800" }],
                        "headline-md": ["32px", { "lineHeight": "40px", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["36px", { "lineHeight": "44px", "fontWeight": "700" }],
                        "headline-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }

</head>
<body class="bg-background text-on-background min-h-screen flex flex-col md:flex-row antialiased">
<!-- OVERRIDE NOTE: Navigation components (TopNavBar, Footer) have been intentionally suppressed 
         in accordance with the 'Semantic Shell Mandate' for linear/transactional pages (Login). -->
<!-- Left Panel: Authentication (40%) -->
<main class="w-full md:w-[40%] min-h-screen flex flex-col justify-center px-margin-mobile md:px-margin-desktop bg-surface border-r-0 md:border-r-2 border-primary z-10 relative">
<!-- Decorative subtle element -> tactile minimalism -->
<div class="absolute top-margin-mobile md:top-margin-desktop left-margin-mobile md:left-margin-desktop">
<span class="font-headline-md text-headline-md md:font-display-lg md:text-[64px] font-extrabold text-primary tracking-tighter uppercase leading-[0.8] block">Project Nature</span>
</div>
<div class="w-full max-w-md mx-auto mt-32 md:mt-0 relative">
<h1 class="font-headline-lg text-headline-lg text-primary font-bold uppercase tracking-tight mb-10 mt-12">Connexion</h1>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div>
<label class="font-label-caps text-label-caps text-primary block mb-2" for="email">EMAIL</label>
<div class="relative">
<input class="w-full border-2 border-primary bg-surface-container-lowest py-3 px-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-0 shadow-[4px_4px_0px_#2C4231] rounded-DEFAULT transition-shadow focus:shadow-[2px_2px_0px_#2C4231] focus:translate-y-0.5 focus:translate-x-0.5" id="email" name="email" placeholder="explorateur@nature.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex justify-between items-baseline mb-2">
<label class="font-label-caps text-label-caps text-primary block" for="password">MOT DE PASSE</label>
</div>
<div class="relative">
<input class="w-full border-2 border-primary bg-surface-container-lowest py-3 px-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-0 shadow-[4px_4px_0px_#2C4231] rounded-DEFAULT transition-shadow focus:shadow-[2px_2px_0px_#2C4231] focus:translate-y-0.5 focus:translate-x-0.5" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
<div class="text-right mt-2">
<a class="font-label-caps text-[12px] text-secondary hover:underline underline-offset-4 decoration-2" href="#">Mot de passe oublié ?</a>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-secondary text-on-secondary border-2 border-primary py-4 px-6 font-label-caps text-label-caps tracking-widest shadow-[4px_4px_0px_#2C4231] hover:-translate-y-0.5 hover:-translate-x-0.5 hover:shadow-[6px_6px_0px_#2C4231] active:translate-y-1 active:translate-x-1 active:shadow-none transition-all rounded-DEFAULT flex justify-center items-center gap-2" type="submit">
                        SE CONNECTER
                        <span aria-hidden="true" class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-12 text-center border-t-2 border-outline-variant pt-8">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Pas encore d'aventure ? 
                    <a class="text-secondary font-bold hover:underline decoration-2 underline-offset-4 ml-1" href="#">Créer un compte</a>
</p>
</div>
</div>
</main>
<!-- Right Panel: Immersive Visual (60%) -->
<aside class="hidden md:block w-[60%] relative overflow-hidden bg-primary-container">
<!-- Background Image with highly detailed prompt for generation -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="A breathtaking, wide-angle photograph of a dramatic Algerian mountain landscape, resembling the Hoggar or Tassili regions, captured at the peak of sunset. The sky is ablaze with rich, warm orange and amber hues, contrasting sharply with the deep, shadowed greens of sparse vegetation and the harsh, dark silhouettes of jagged rock formations. The lighting is cinematic and golden, highlighting the rugged textures of the stone. The overall aesthetic perfectly balances organic natural beauty with a sophisticated, editorial photography style, suited for a high-end exploration brand." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCljJvyaGkf1y2WXHrK93oDCMDZa-dvb6_qOgVZBoWlfKzz6WsI1Qz8CjxFwWAuxhB2lKbQe2d-NohY804mEsiusrygo-sidVE8xf-iq_WTcz54PuGsF13rAumRCYz1rXMdvNFcp3M7m6FyMrLOVCSJ1avl7kjZx-AR1zCUDVcnnhxEmrR7Rq9TdtGlcoxFp0LY49qRlvn8FnvHkOaAeO0SdZCpJyD1VVWG5ypqMmmo_xMG7BnDmv4L')">
</div>
<!-- Overlay to ensure text readability while maintaining image impact -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 via-primary/20 to-transparent mix-blend-multiply"></div>
<!-- Quote Block (Brutalist / Offset layer) -->
<div class="absolute bottom-margin-desktop left-margin-desktop right-margin-desktop max-w-2xl">
<div class="bg-surface-container-low/95 backdrop-blur-sm border-2 border-primary p-8 shadow-[8px_8px_0px_#B04A1B] relative">
<!-- Decorative element pinning the note -->
<div class="absolute -top-3 -left-3 w-6 h-6 bg-secondary border-2 border-primary rounded-full shadow-[2px_2px_0px_#2C4231]"></div>
<p class="font-headline-md text-headline-md text-primary leading-snug">
                    "L'aventure n'est pas dans l'ascension, mais dans la rencontre."
                </p>
</div>
</div>
</aside>
</body></html>
