<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col justify-center px-margin-mobile py-gutter relative z-10">
<!-- Decorative Background Element (Tactile Layering) -->
<div class="absolute top-0 right-0 -mt-12 -mr-12 w-48 h-48 bg-tertiary-fixed rounded-full opacity-20 -z-10 blur-2xl"></div>
<div class="absolute bottom-20 left-0 -ml-16 w-32 h-32 bg-secondary-fixed opacity-20 -z-10 blur-xl"></div>
<!-- Header Section -->
<div class="mb-10 relative">
<button aria-label="Retour" class="w-10 h-10 border-2 border-primary bg-surface flex items-center justify-center mb-6 shadow-[2px_2px_0px_0px_#162c1c] active:translate-x-[2px] active:translate-y-[2px] active:shadow-none transition-all">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile uppercase break-words leading-tight">
                Réinitialiser<br/>le mot de passe
            </h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-4 max-w-xs">
                Entrez votre adresse email et le code reçu pour sécuriser votre accès au journal de bord.
            </p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="flex flex-col gap-2 relative">
<label class="font-label-caps text-label-caps uppercase text-primary tracking-widest pl-1" for="email">
                    Adresse Email
                </label>
<div class="relative group">
<input class="w-full bg-surface-bright border-2 border-primary p-4 font-body-md text-body-md text-primary placeholder:text-outline focus:outline-none focus:border-secondary shadow-[4px_4px_0px_0px_#162c1c] transition-colors rounded-none peer" id="email" placeholder="explorateur@nature.com" required="" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline peer-focus:text-secondary pointer-events-none transition-colors">
                        mail
                    </span>
</div>
</div>
<!-- Divider/Instruction (Optional tactile break) -->
<div class="w-full h-px bg-outline-variant my-2 relative">
<span class="absolute left-1/2 -translate-x-1/2 -top-3 bg-background px-4 font-label-caps text-label-caps text-outline-variant uppercase">Et</span>
</div>
<!-- OTP Input -->
<div class="flex flex-col gap-2 relative mt-2">
<label class="font-label-caps text-label-caps uppercase text-primary tracking-widest pl-1" for="otp">
                    Code de validation (OTP)
                </label>
<div class="relative group">
<input class="w-full bg-surface-bright border-2 border-primary p-4 font-headline-md text-headline-md text-center text-primary placeholder:text-outline focus:outline-none focus:border-secondary shadow-[4px_4px_0px_0px_#162c1c] transition-colors rounded-none tracking-[0.5em]" id="otp" inputmode="numeric" maxlength="6" pattern="[0-9]*" placeholder="1 2 3 4 5 6" required="" type="text"/>
<div class="absolute inset-y-0 right-4 flex items-center">
<span class="material-symbols-outlined text-outline peer-focus:text-secondary pointer-events-none transition-colors text-[20px]">
                            password
                        </span>
</div>
</div>
<button class="self-end mt-1 font-label-caps text-label-caps text-secondary underline hover:text-primary transition-colors uppercase" type="button">
                    Renvoyer le code
                </button>
</div>
