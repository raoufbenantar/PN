        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-background text-on-background min-h-screen flex flex-col md:flex-row antialiased">
<!-- Left side: Immersive imagery (Desktop only) -->
<div class="hidden md:block md:w-1/2 lg:w-3/5 h-screen relative overflow-hidden border-r-2 border-primary">
<div class="absolute inset-0 bg-cover bg-center h-full w-full" data-alt="A breathtaking, cinematic photograph of a rugged mountain peak piercing through dense, low-hanging clouds at dawn. The light is crisp and cold, casting deep, dramatic shadows in dark forest greens (#162c1c) across the jagged rocks. Subtle hints of rust orange (#a23f0a) from the rising sun gently illuminate the edges of the mist. The overall composition is asymmetrical and evokes a profound sense of raw, untamed wilderness and adventurous isolation, fitting a high-end editorial nature journal aesthetic." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuClg8-WJqIO1eN5vpejsvboHOpxFpdY90yTYsBhE_vTb6hNmxdiqgV2qzJPa96PA-_3M-xsJWnKbyUXn7GTTrX3uWcZ4bh7jMlwaEAtg-UHc-V-7_UGp2FSf1MCGhWRY0envMCOwPKhQmoghUycNxMugCjRBffWDdI2gfOyp9-1m8W9JljijhZ23KZSaEx1ZtLoDMmZIrkT7rDcGbnx6yyuRy_4xReEg3jQrqxmbTOFYOWi9Arabxc6')"></div>
<div class="absolute inset-0 bg-primary/20 mix-blend-multiply"></div>
<!-- Brand overlay -->
<div class="absolute top-margin-desktop left-margin-desktop z-10">
<span class="font-display-lg text-headline-lg tracking-tighter text-background uppercase">Project Nature</span>
</div>
</div>
<!-- Right side: Form Container -->
<div class="w-full md:w-1/2 lg:w-2/5 h-screen flex flex-col justify-center px-margin-mobile md:px-margin-desktop relative overflow-y-auto">
<!-- Mobile Header (Hidden on Desktop) -->
<div class="md:hidden mt-margin-mobile mb-12">
<span class="font-display-lg text-headline-md tracking-tighter text-primary uppercase">Project Nature</span>
</div>
<div class="w-full max-w-md mx-auto relative z-10">
<!-- Decorative leaf/nature motif (Brutalist style) -->
<div class="absolute -top-12 -left-8 text-primary opacity-20 pointer-events-none transform -rotate-12">
<span class="material-symbols-outlined" style="font-size: 80px;">eco</span>
</div>
<!-- Header -->
<div class="mb-10 relative">
<h1 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary uppercase mb-2">NOUVEAU MOT DE PASSE</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Saisissez un nouveau mot de passe robuste pour sécuriser votre accès au journal de bord.</p>
</div>
<!-- Form -->
<form class="space-y-6 flex flex-col">
<!-- Password Field -->
<div class="flex flex-col gap-2 relative group">
<label class="font-label-caps text-label-caps text-primary uppercase" for="new_password">Nouveau mot de passe</label>
<div class="relative">
<input class="w-full bg-surface border-2 border-primary text-primary px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-0 focus:border-secondary transition-colors" id="new_password" name="new_password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-primary hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2 relative group mt-6">
<label class="font-label-caps text-label-caps text-primary uppercase" for="confirm_password">Confirmer le mot de passe</label>
<div class="relative">
<input class="w-full bg-surface border-2 border-primary text-primary px-4 py-3 font-body-md text-body-md focus:outline-none focus:ring-0 focus:border-secondary transition-colors" id="confirm_password" name="confirm_password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 transform -translate-y-1/2 text-primary hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Structural Layering / Tactile Brutalism Submit Button -->
<div class="pt-6 mt-4">
<button class="w-full bg-secondary text-on-secondary font-label-caps text-label-caps py-4 px-6 border-2 border-primary shadow-[4px_4px_0px_0px_rgba(22,44,28,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-none active:translate-x-[4px] active:translate-y-[4px] transition-all duration-200 uppercase tracking-widest flex justify-center items-center gap-2" type="submit">
<span>ENREGISTRER</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
<!-- Back to Login Link -->
<div class="mt-8 text-center">
<a class="font-label-caps text-label-caps text-primary hover:text-secondary flex items-center justify-center gap-2 transition-colors" href="#">
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
                    RETOURNER À LA CONNEXION
                </a>
</div>
</div>
<!-- Decorative shadow block behind container (mimicking tactile layout) -->
<div class="hidden md:block absolute bottom-0 right-0 w-64 h-64 bg-tertiary-fixed-dim -z-10 transform translate-x-1/3 translate-y-1/3 border-t-2 border-l-2 border-primary"></div>
</div>
</body></html>
