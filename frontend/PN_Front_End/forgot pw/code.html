<script>
        document.addEventListener('DOMContentLoaded', () => {
            const emailInput = document.getElementById('email');
            const otpContainer = document.getElementById('otp-container');
            const submitBtn = document.getElementById('submit-btn');
            let isOtpVisible = false;

            // Simple interaction: Show OTP field when email has valid format and user clicks continue
            submitBtn.addEventListener('click', (e) => {
                if (!isOtpVisible) {
                    if (emailInput.value && emailInput.checkValidity()) {
                        e.preventDefault();
                        
                        // Fake loading state
                        const originalText = submitBtn.innerHTML;
                        submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> VERIFYING...';
                        submitBtn.classList.add('opacity-80', 'pointer-events-none');

                        setTimeout(() => {
                            // Show OTP field
                            otpContainer.classList.remove('hidden');
                            // Trigger reflow for transition
                            void otpContainer.offsetWidth;
                            otpContainer.classList.remove('opacity-0');
                            
                            // Update button state
                            submitBtn.innerHTML = 'VERIFY CODE <span class="material-symbols-outlined">check_circle</span>';
                            submitBtn.classList.remove('opacity-80', 'pointer-events-none');
                            
                            // Lock email field
                            emailInput.setAttribute('readonly', 'true');
                            emailInput.classList.add('bg-surface-variant', 'text-on-surface-variant');
                            
                            isOtpVisible = true;
                            
                            // Focus OTP input
                            document.getElementById('otp').focus();
                        }, 800);
                    } else {
                        // Shake email input if invalid
                        emailInput.parentElement.classList.add('animate-pulse', 'border-error');
                        setTimeout(() => emailInput.parentElement.classList.remove('animate-pulse', 'border-error'), 500);
                    }
                } else {
                    // Final submission logic would go here
                    const otpInput = document.getElementById('otp');
                    if(otpInput.value.length > 5) {
                         submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> PROCESSING...';
                         submitBtn.classList.add('opacity-80', 'pointer-events-none');
                    } else {
                         otpInput.parentElement.classList.add('border-error');
                         setTimeout(() => otpInput.parentElement.classList.remove('border-error'), 500);
                    }
                }
            });

            // Auto-format OTP (e.g. 123-456)
            const otpInput = document.getElementById('otp');
            otpInput.addEventListener('input', function (e) {
                let val = e.target.value.replace(/\D/g, '');
                if (val.length > 3) {
                    val = val.substring(0, 3) + '-' + val.substring(3, 6);
                }
                e.target.value = val;
            });
        });
    </script>
