<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md overflow-x-hidden relative">
<!-- Decorative background elements -->
<div class="absolute top-0 right-0 w-64 h-64 bg-secondary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-50 -translate-y-1/2 translate-x-1/4 pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-72 h-72 bg-primary-fixed-dim rounded-full mix-blend-multiply filter blur-3xl opacity-30 translate-y-1/4 -translate-x-1/4 pointer-events-none"></div>
<main class="flex-grow flex flex-col items-center justify-center p-margin-mobile w-full max-w-md mx-auto relative z-10">
<!-- Brand Logo Area -->
<div class="w-full flex justify-center mb-12">
<div class="w-16 h-16 bg-primary border-2 border-primary rounded-DEFAULT shadow-[4px_4px_0px_0px_rgba(22,44,28,1)] flex items-center justify-center rotate-3">
<span class="material-symbols-outlined text-background text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">landscape</span>
</div>
</div>
<!-- Main Form Container -->
<div class="w-full bg-surface-container-lowest border-2 border-primary rounded-lg shadow-[8px_8px_0px_0px_rgba(22,44,28,1)] p-gutter relative -rotate-1 z-20">
<div class="mb-8 text-center">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tighter uppercase mb-2">
                    Nouveau Mot de Passe
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Sécurisez votre compte d'expédition. Choisissez un mot de passe robuste.
                </p>
</div>
<form class="space-y-6">
<!-- New Password Field -->
<div class="space-y-2 relative group">
<label class="font-label-caps text-label-caps text-primary block" for="new_password">
                        NOUVEAU MOT DE PASSE
                    </label>
<div class="relative">
<input class="w-full bg-background border-2 border-primary rounded-DEFAULT py-3 px-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-0 focus:border-secondary transition-colors" id="new_password" name="new_password" placeholder="Entrez votre nouveau mot de passe" required="" type="password"/>
<button aria-label="Afficher le mot de passe" class="absolute right-3 top-1/2 -translate-y-1/2 text-primary hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<!-- Password strength indicator (visual only) -->
<div class="flex gap-1 mt-2">
<div class="h-1 w-1/4 bg-primary-container"></div>
<div class="h-1 w-1/4 bg-surface-variant"></div>
<div class="h-1 w-1/4 bg-surface-variant"></div>
<div class="h-1 w-1/4 bg-surface-variant"></div>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2 relative group">
<label class="font-label-caps text-label-caps text-primary block" for="confirm_password">
                        CONFIRMER LE MOT DE PASSE
                    </label>
<div class="relative">
<input class="w-full bg-background border-2 border-primary rounded-DEFAULT py-3 px-4 font-body-md text-body-md text-on-surface focus:outline-none focus:ring-0 focus:border-secondary transition-colors" id="confirm_password" name="confirm_password" placeholder="Répétez le mot de passe" required="" type="password"/>
<button aria-label="Afficher le mot de passe" class="absolute right-3 top-1/2 -translate-y-1/2 text-primary hover:text-secondary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary text-on-secondary font-label-caps text-label-caps py-4 px-6 border-2 border-primary rounded-DEFAULT shadow-[4px_4px_0px_0px_rgba(22,44,28,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(22,44,28,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all flex items-center justify-center gap-2 mt-8" type="submit">
<span>RÉINITIALISER</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
</div>
<!-- Back to login link -->
<div class="mt-8 text-center z-10 relative">
<a class="font-label-caps text-label-caps text-primary border-b-2 border-transparent hover:border-primary transition-colors flex items-center justify-center gap-2 inline-flex" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                RETOUR À LA CONNEXION
            </a>
</div>

<div class="fixed bottom-0 left-0 w-full flex justify-between p-base pointer-events-none opacity-20">
<span class="material-symbols-outlined text-6xl text-primary -rotate-12">park</span>
