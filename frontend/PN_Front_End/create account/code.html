<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col antialiased selection:bg-secondary selection:text-on-secondary">
<!-- The TopNavBar component is SUPPRESSED because this is a transactional/linear screen (Registration). -->
<main class="flex-grow flex flex-col md:flex-row w-full min-h-screen">
<!-- Left Side: Image / Brand Anchor -->
<section class="hidden md:flex md:w-1/2 relative bg-primary overflow-hidden">
<div class="absolute inset-0 bg-cover bg-center" data-alt="A sweeping, majestic view of a rugged mountain range at sunrise. The sky is a gradient of deep oranges and purples, casting long shadows across the rocky terrain. The aesthetic is raw, natural, and adventurous, embodying a spirit of exploration and wilderness. High contrast, atmospheric lighting." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuANn4rhTzScBo3-lYlSShRYS5u7oJNZgB8_4AMmUm0T3_iNb40n0tZphNoSHyLK5yFs2ITGWVBnQ_fB4dpTwPKwos9ErrQdtgWP8xgbxD3oAud7FEuKKXDdqWB16EMajd0X6InBc30x-hf7SYV9A-S2g8Pt668wWFPNKIrXvP_PaEvi9Xb8Tqci0RLV6uHrqWK_Pjb-yNpMEkOjORfgc1InrZzle3q9OMOVDL6voYEh3mBGb3UPCNV9')">
</div>
<!-- Overlay for text readability if needed, though raw image is preferred in brutalist style -->
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent"></div>
<div class="relative z-10 flex flex-col justify-end p-margin-desktop w-full text-surface h-full">
<div class="flex items-center gap-base mb-8">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">landscape</span>
<h1 class="font-headline-md text-headline-md font-bold tracking-tighter">PROJECT NATURE</h1>
</div>
<p class="font-body-lg text-body-lg text-surface-container-high max-w-md">
                    Explorez les recoins les plus sauvages de l'Algérie avec une communauté de passionnés.
                </p>
</div>
</section>
<!-- Right Side: Registration Form -->
<section class="w-full md:w-1/2 flex flex-col justify-center items-center p-margin-mobile md:p-margin-desktop bg-surface relative">
<!-- Mobile Brand Header (Visible only on small screens) -->
<div class="md:hidden flex items-center gap-base mb-12 w-full max-w-md self-start text-primary">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">landscape</span>
<span class="font-headline-md text-[24px] font-bold tracking-tighter">PROJECT NATURE</span>
</div>
<div class="w-full max-w-md relative z-10 bg-surface border-2 border-primary p-8 shadow-[8px_8px_0px_0px_rgba(22,44,28,1)]">
<h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary mb-2 uppercase break-words">
                    Rejoignez L'Aventure
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-8">
                    Créez votre profil d'explorateur pour réserver vos prochaines expéditions.
                </p>
<form class="space-y-6">
<!-- Full Name -->
<div>
<label class="block font-label-caps text-label-caps text-primary mb-2 uppercase" for="fullName">Nom Complet</label>
<input class="w-full bg-surface-container-lowest border-2 border-primary p-3 focus:outline-none focus:ring-0 focus:border-secondary transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="fullName" name="fullName" placeholder="Ex: Amine Khali" type="text"/>
</div>
<!-- Email -->
<div>
<label class="block font-label-caps text-label-caps text-primary mb-2 uppercase" for="email">Adresse Email</label>
<input class="w-full bg-surface-container-lowest border-2 border-primary p-3 focus:outline-none focus:ring-0 focus:border-secondary transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="email" name="email" placeholder="amine@exemple.com" type="email"/>
</div>
<!-- Phone Number -->
<div>
<label class="block font-label-caps text-label-caps text-primary mb-2 uppercase" for="phone">Numéro de Téléphone</label>
<input class="w-full bg-surface-container-lowest border-2 border-primary p-3 focus:outline-none focus:ring-0 focus:border-secondary transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="phone" name="phone" placeholder="0555 00 00 00" type="tel"/>
</div>
<!-- Password -->
<div>
<label class="block font-label-caps text-label-caps text-primary mb-2 uppercase flex justify-between items-center" for="password">
<span>Mot de Passe</span>
</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-2 border-primary p-3 pr-12 focus:outline-none focus:ring-0 focus:border-secondary transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-primary hover:text-secondary transition-colors" onclick="togglePassword('password', 'toggleIcon1')" type="button">
<span class="material-symbols-outlined" id="toggleIcon1">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block font-label-caps text-label-caps text-primary mb-2 uppercase" for="confirmPassword">Confirmer le Mot de Passe</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-2 border-primary p-3 pr-12 focus:outline-none focus:ring-0 focus:border-secondary transition-colors font-body-md text-on-surface placeholder:text-outline-variant" id="confirmPassword" name="confirmPassword" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-primary hover:text-secondary transition-colors" onclick="togglePassword('confirmPassword', 'toggleIcon2')" type="button">
<span class="material-symbols-outlined" id="toggleIcon2">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full bg-secondary text-on-secondary font-label-caps text-label-caps uppercase py-4 px-6 border-2 border-primary flex justify-center items-center gap-2 hover:bg-secondary-container hover:text-on-secondary-container transition-colors shadow-[4px_4px_0px_0px_rgba(22,44,28,1)] active:translate-y-1 active:shadow-none" type="submit">
<span>CRÉER UN COMPTE</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<a class="font-body-md text-body-md text-primary hover:text-secondary border-b-2 border-transparent hover:border-secondary transition-colors inline-flex items-center gap-1" href="#">
                        Déjà un aventurier ? Se connecter
                        <span class="material-symbols-outlined text-sm">login</span>
</a>
</div>
<!-- Decorative elements to break rigidity -->
<div class="absolute -top-6 -right-6 w-12 h-12 bg-tertiary-container border-2 border-primary shadow-[2px_2px_0px_0px_rgba(22,44,28,1)] transform rotate-12 z-[-1]"></div>
<div class="absolute -bottom-4 -left-4 w-16 h-8 bg-inverse-primary border-2 border-primary shadow-[2px_2px_0px_0px_rgba(22,44,28,1)] transform -rotate-6 z-[-1]"></div>
</div>
<!-- Background aesthetic texture/pattern suggestion -->
<div class="absolute inset-0 opacity-5 pointer-events-none" style="background-image: repeating-linear-gradient(45deg, #162c1c 25%, transparent 25%, transparent 75%, #162c1c 75%, #162c1c), repeating-linear-gradient(45deg, #162c1c 25%, transparent 25%, transparent 75%, #162c1c 75%, #162c1c); background-position: 0 0, 10px 10px; background-size: 20px 20px;"></div>
</section>
</main>
<script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                input.type = 'password';
                icon.textContent = 'visibility';
            }
        }
    </script>
</body></html>
